<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 外圆 -->
  <circle cx="100" cy="100" r="90" stroke="#3b82f6" stroke-width="3" fill="none" opacity="0.3"/>

  <!-- 人形图标 -->
  <g fill="#3b82f6" opacity="0.8">
    <!-- 头部 -->
    <circle cx="100" cy="70" r="25"/>

    <!-- 身体 -->
    <path d="M60 160 Q60 120 100 120 Q140 120 140 160 L140 180 L60 180 Z"/>
  </g>

  <!-- 装饰圆点 -->
  <circle cx="100" cy="100" r="80" stroke="#10b981" stroke-width="2" fill="none" opacity="0.2" stroke-dasharray="10,5"/>

  <!-- 科技感元素 -->
  <circle cx="30" cy="40" r="5" fill="#f472b6" opacity="0.6"/>
  <circle cx="170" cy="40" r="5" fill="#10b981" opacity="0.6"/>
  <circle cx="30" cy="160" r="5" fill="#10b981" opacity="0.6"/>
  <circle cx="170" cy="160" r="5" fill="#f472b6" opacity="0.6"/>
</svg>